services:
  postgres:
    image: postgres:15
    container_name: ecommerce_db
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: online-shopping
    ports:
      - "5428:5432"
    volumes:
      - db:/var/lib/postgresql/data

volumes:
  db:
    driver: local